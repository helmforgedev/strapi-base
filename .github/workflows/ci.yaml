name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "Linting not configured"

      - name: Format check
        run: npm run format || echo "Formatting not configured"

  build-app:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Strapi
        env:
          NODE_ENV: production
        run: npm run build

  build-image:
    runs-on: ubuntu-latest
    needs: [lint, build-app]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: helmforge/strapi-base:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/strapi-base:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability report (HIGH)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/strapi-base:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy SBOM generation
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: helmforge/strapi-base:ci
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  ci:
    if: always()
    needs: [lint, build-app, build-image]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build-app.result }}" != "success" ] || \
             [ "${{ needs.build-image.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
