name: Release

on:
  push:
    branches: [main, master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: semver
        run: |
          # Get last tag or default to v0.0.0
          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last version: $LAST"

          # Increment patch version
          NEW=$(echo $LAST | awk -F. -v OFS=. '{$NF+=1; print}')
          echo "New version: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          release_name: Release ${{ steps.semver.outputs.version }}
          body: |
            ## Strapi Base ${{ steps.semver.outputs.version }}

            Production-ready Strapi 5.42.0 base image with Node.js 22.

            ### Features
            - Multi-database support (SQLite, PostgreSQL, MySQL)
            - Multi-arch (amd64, arm64)
            - Health check endpoint (/_health)
            - Security hardened
            - Signed with Cosign
            - SBOM included

            ### Docker
            \`\`\`bash
            docker pull helmforge/strapi-base:${{ steps.semver.outputs.version }}
            \`\`\`
          draft: false
          prerelease: false

  build:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            helmforge/strapi-base:${{ needs.release.outputs.version }}
            helmforge/strapi-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            helmforge/strapi-base:${{ needs.release.outputs.version }}

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft helmforge/strapi-base:${{ needs.release.outputs.version }} \
            -o spdx-json=sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: helmforge/strapi-base:${{ needs.release.outputs.version }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
